<!DOCTYPE html>
<!--
  ============================================================
  360° Viewer
  ============================================================
  Version  : 1.0.0
  Date     : 2025-06-25
  File     : 360-viewer.html

  Changelog:
  1.0.0 - Initial release
        - ESM imports via importmap (three@0.184.0, PSV 5.14.2)
        - Photo support: PSV Cache pre-population bypasses
          Three.js FileLoader / Request cloning (DataCloneError fix)
        - Video support: DOM-attached <video> with no crossOrigin
          attribute avoids blob URL safety check
        - AutorotatePlugin, MarkersPlugin, VideoPlugin
        - Drag-and-drop + file picker
        - Error panel surfaces real error messages
  ============================================================
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>360° Media Viewer</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.14.2/index.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/video-plugin@5.14.2/index.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin@5.14.2/index.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/autorotate-plugin@5.14.2/index.min.css">

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
      "@photo-sphere-viewer/core":                          "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.14.2/index.module.js",
      "@photo-sphere-viewer/equirectangular-video-adapter": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/equirectangular-video-adapter@5.14.2/index.module.js",
      "@photo-sphere-viewer/video-plugin":                  "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/video-plugin@5.14.2/index.module.js",
      "@photo-sphere-viewer/markers-plugin":                "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin@5.14.2/index.module.js",
      "@photo-sphere-viewer/autorotate-plugin":             "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/autorotate-plugin@5.14.2/index.module.js"
    }
  }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f; color: #e0e0e0;
      height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
    }
    #topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px; background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a; flex-shrink: 0; flex-wrap: wrap;
    }
    #topbar h1 { font-size: 15px; font-weight: 600; color: #fff; }
    #topbar h1 span { color: #6b8cff; }
    .file-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; background: #6b8cff; color: #fff;
      border: none; border-radius: 6px; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: background 0.15s;
    }
    .file-btn:hover { background: #5577ee; }
    #file-input { display: none; }
    #media-name { font-size: 12px; color: #888; max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #mode-badge { margin-left: auto; font-size: 11px; padding: 3px 8px; border-radius: 4px; display: none; }
    #mode-badge.photo { background: #1a3a2a; color: #5dba8a; display: inline; }
    #mode-badge.video { background: #1a2a3a; color: #5aaada; display: inline; }
    #viewer-wrap { flex: 1; position: relative; min-height: 0; }
    #viewer { width: 100%; height: 100%; }
    #splash {
      position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; background: #0f0f0f; z-index: 10;
      transition: opacity 0.3s; padding: 24px;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    .drop-zone {
      border: 2px dashed #333; border-radius: 16px; padding: 48px 40px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      max-width: 400px; width: 100%; text-align: center;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone.dragover { border-color: #6b8cff; background: #1a1e2e; }
    .drop-icon { font-size: 48px; line-height: 1; }
    .drop-zone h2 { font-size: 18px; font-weight: 600; color: #fff; }
    .drop-zone p  { font-size: 13px; color: #666; line-height: 1.5; }
    .drop-zone em { color: #6b8cff; font-style: normal; }
    #error-panel {
      display: none; position: absolute; bottom: 16px; left: 50%;
      transform: translateX(-50%); background: #2a1a1a;
      border: 1px solid #6b2a2a; border-radius: 8px; padding: 12px 16px;
      font-size: 12px; color: #f08080; max-width: 560px;
      width: calc(100% - 32px); z-index: 20; word-break: break-word;
    }
    #error-panel strong { display: block; margin-bottom: 4px; color: #ff8080; font-size: 13px; }
    #error-panel.show { display: block; }
    #error-close { float: right; cursor: pointer; opacity: 0.6; font-size: 14px; margin-left: 8px; }
    #error-close:hover { opacity: 1; }
    #status-bar {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: #fff; font-size: 12px;
      padding: 6px 14px; border-radius: 20px; pointer-events: none;
      opacity: 0; transition: opacity 0.3s; white-space: nowrap; z-index: 20;
    }
    #status-bar.show { opacity: 1; }
  </style>
</head>
<body>

<div id="topbar">
  <h1>360° <span>Viewer</span></h1>
  <button class="file-btn" onclick="document.getElementById('file-input').click()">📂 Open file</button>
  <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp,video/mp4,video/webm">
  <span id="media-name">No file loaded</span>
  <span id="mode-badge"></span>
</div>

<div id="viewer-wrap">
  <div id="viewer"></div>
  <div id="splash">
    <div class="drop-zone" id="drop-zone">
      <div class="drop-icon">🌐</div>
      <h2>Drop your 360° media here</h2>
      <p>
        Supports <em>equirectangular photos</em> (.jpg, .png, .webp)<br>
        and <em>360° videos</em> (.mp4, .webm) from Insta360, GoPro Max, and others
      </p>
      <button class="file-btn" onclick="document.getElementById('file-input').click()">Browse files</button>
    </div>
  </div>
  <div id="error-panel">
    <span id="error-close" onclick="document.getElementById('error-panel').classList.remove('show')">✕</span>
    <strong id="error-title">Error</strong>
    <span id="error-msg"></span>
  </div>
  <div id="status-bar"></div>
</div>

<video id="hidden-video" loop playsinline muted preload="auto" style="display:none"></video>

<!-- Step 1: probe each module individually before the main script runs -->
<script type="module">
  const modules = [
    ['three',                                        'https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js'],
    ['@photo-sphere-viewer/core',                    'https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.14.2/index.module.js'],
    ['@photo-sphere-viewer/equirectangular-video-adapter', 'https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/equirectangular-video-adapter@5.14.2/index.module.js'],
    ['@photo-sphere-viewer/video-plugin',            'https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/video-plugin@5.14.2/index.module.js'],
    ['@photo-sphere-viewer/markers-plugin',          'https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/markers-plugin@5.14.2/index.module.js'],
    ['@photo-sphere-viewer/autorotate-plugin',       'https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/autorotate-plugin@5.14.2/index.module.js'],
  ];

  const results = await Promise.allSettled(
    modules.map(([name, url]) =>
      import(url).then(() => ({ name, ok: true })).catch(e => ({ name, ok: false, error: e?.message || String(e) }))
    )
  );

  const failed = results.filter(r => r.status === 'fulfilled' && !r.value.ok);
  if (failed.length) {
    console.error('[360 Viewer] Module load failures:', failed.map(r => r.value));
    // Surface these to the error panel
    window.__moduleErrors = failed.map(r => `${r.value.name}: ${r.value.error}`).join('\n');
  } else {
    console.log('[360 Viewer] All modules loaded OK');
  }
</script>

<script type="module">
  function showError(title, detail) {
    document.getElementById('error-title').textContent = title;
    document.getElementById('error-msg').textContent = detail || '';
    document.getElementById('error-panel').classList.add('show');
    console.error('[360 Viewer]', title, detail);
  }

  // Surface any module probe errors that ran before us
  if (window.__moduleErrors) {
    showError('One or more modules failed to load', window.__moduleErrors);
  }

  // Catch remaining unhandled errors (e.g. from the main import block below)
  window.addEventListener('error', e => {
    const msg = e.message || '[object Event]';
    if (msg === '[object Event]' || msg.includes('Failed to fetch') || msg.includes('import')) {
      showError('Script load error', 'A module could not be imported. See the browser Network tab for the failing URL. Message: ' + msg);
    }
  });
  window.addEventListener('unhandledrejection', e => {
    showError('Unhandled promise rejection', e.reason?.message || String(e.reason));
  });

  import { Viewer, Cache }               from '@photo-sphere-viewer/core';
  import { EquirectangularVideoAdapter } from '@photo-sphere-viewer/equirectangular-video-adapter';
  import { VideoPlugin }                 from '@photo-sphere-viewer/video-plugin';
  import { MarkersPlugin }               from '@photo-sphere-viewer/markers-plugin';
  import { AutorotatePlugin }            from '@photo-sphere-viewer/autorotate-plugin';

  const PHOTO_KEY = 'psv-local-photo';
  let viewer = null;
  let currentBlobURL = null;
  const hiddenVideo = document.getElementById('hidden-video');

  const statusBar = document.getElementById('status-bar');
  let statusTimer;
  function showStatus(msg, duration = 2800) {
    statusBar.textContent = msg;
    statusBar.classList.add('show');
    clearTimeout(statusTimer);
    statusTimer = setTimeout(() => statusBar.classList.remove('show'), duration);
  }

  const viewerWrap = document.getElementById('viewer-wrap');
  const dropZone   = document.getElementById('drop-zone');
  viewerWrap.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  viewerWrap.addEventListener('dragleave', ()  => dropZone.classList.remove('dragover'));
  viewerWrap.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0]; if (file) loadFile(file);
  });
  document.getElementById('file-input').addEventListener('change', e => {
    const file = e.target.files[0]; if (file) loadFile(file); e.target.value = '';
  });

  async function loadFile(file) {
    document.getElementById('error-panel').classList.remove('show');
    const isVideo = file.type.startsWith('video/');
    const isPhoto = file.type.startsWith('image/');
    if (!isVideo && !isPhoto) { showError('Unsupported file type', `${file.name} (${file.type || 'unknown'})`); return; }
    document.getElementById('media-name').textContent = file.name;
    const badge = document.getElementById('mode-badge');
    badge.className = isVideo ? 'video' : 'photo';
    badge.textContent = isVideo ? '▶ Video' : '🖼 Photo';
    document.getElementById('splash').classList.add('hidden');
    try {
      if (isVideo) {
        if (currentBlobURL) URL.revokeObjectURL(currentBlobURL);
        currentBlobURL = URL.createObjectURL(file);
        await loadVideo(currentBlobURL);
      } else {
        showStatus('Reading image…');
        Cache.add(PHOTO_KEY, PHOTO_KEY, file);
        await loadPhoto();
      }
    } catch (err) { showError('Failed to load file', err?.message || String(err)); }
  }

  function destroyViewer() {
    if (viewer) { try { viewer.destroy(); } catch (_) {} viewer = null; }
    document.getElementById('viewer').innerHTML = '';
    hiddenVideo.pause(); hiddenVideo.removeAttribute('src'); hiddenVideo.load();
  }

  function loadPhoto() {
    destroyViewer();
    return new Promise((resolve, reject) => {
      viewer = new Viewer({
        container: document.getElementById('viewer'),
        panorama: PHOTO_KEY,
        defaultYaw: 0, defaultPitch: 0, minFov: 30, maxFov: 90,
        navbar: ['autorotate', 'zoom', 'move', 'fullscreen'],
        plugins: [AutorotatePlugin, MarkersPlugin],
      });
      viewer.addEventListener('ready', () => { showStatus('Photo loaded — drag to look around, scroll to zoom'); resolve(); });
      viewer.addEventListener('error', e => { const m = e.error?.message || String(e.error); showError('Photo failed to load', m); reject(new Error(m)); });
    });
  }

  function loadVideo(blobURL) {
    destroyViewer();
    hiddenVideo.src = blobURL;
    hiddenVideo.addEventListener('error', () => {
      const err = hiddenVideo.error;
      const codes = ['','ABORTED','NETWORK','DECODE','SRC_NOT_SUPPORTED'];
      showError('Video failed to load', `MediaError ${err?.code ?? '?'} (${codes[err?.code] ?? 'unknown'}): ${err?.message || 'decode error'}`);
    }, { once: true });
    return new Promise((resolve, reject) => {
      viewer = new Viewer({
        container: document.getElementById('viewer'),
        adapter: [EquirectangularVideoAdapter, { autoplay: true, muted: true }],
        panorama: { source: hiddenVideo },
        minFov: 30, maxFov: 90,
        navbar: ['autorotate', 'zoom', 'move', 'fullscreen'],
        plugins: [AutorotatePlugin, VideoPlugin],
      });
      viewer.addEventListener('ready', () => { showStatus('Video loaded — drag to look around, unmute in controls'); resolve(); });
      viewer.addEventListener('error', e => { const m = e.error?.message || String(e.error); showError('Panorama failed to load', m); reject(new Error(m)); });
    });
  }
</script>

</body>
</html>
